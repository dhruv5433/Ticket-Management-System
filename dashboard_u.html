<h1>Welcome, {{username}}</h1>

<a href="/create-ticket">
    Create Ticket
</a>

<h2>My Tickets</h2>

<table>
<tr>
<th>ID</th>
<th>Title</th>
<th>Status</th>
<th>Assigned Level</th>
</tr>

{% for ticket in tickets %}
<tr>
<td>{{ticket.ticket_id}}</td>
<td>{{ticket.title}}</td>
<td>{{ticket.status}}</td>
<td>{{ticket.assigned_level}}</td>
</tr>
{% endfor %}

</table>
